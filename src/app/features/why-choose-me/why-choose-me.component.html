<section id="why" class="why-section section">
    <div class="container">
        <div class="section-header" appScrollReveal>
            <h2 class="gradient-text">Why Choose Me?</h2>
            <p class="subtitle text-muted">Architecting enterprise-grade IoT ecosystems that perform and scale.</p>
        </div>

        <div class="features-grid">
            @for (feature of features; track feature.title; let i = $index) {
            <div class="feature-card clay-card" [appScrollReveal]="i">
                <div class="icon-wrapper">
                    <ng-container [ngSwitch]="feature.icon">

                        <!-- Architecture Diagram -->
                        <svg *ngSwitchCase="'architecture'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7" rx="1" />
                            <rect x="14" y="3" width="7" height="7" rx="1" />
                            <rect x="8.5" y="14" width="7" height="7" rx="1" />
                            <path d="M6.5 10v2a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2v-2" />
                            <circle cx="12" cy="14" r="1.5" fill="currentColor" stroke="none" />
                        </svg>

                        <!-- ThingsBoard Diagram -->
                        <svg *ngSwitchCase="'thingsboard'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 2 7 12 12 22 7 12 2" stroke-linejoin="miter"/>
                            <polyline points="2 17 12 22 22 17" stroke-linejoin="miter"/>
                            <polyline points="2 12 12 17 22 12" stroke-linejoin="miter"/>
                            <circle cx="12" cy="7" r="1.5" fill="currentColor" stroke="none" />
                        </svg>

                        <!-- Analytics Diagram -->
                        <svg *ngSwitchCase="'analytics'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 3v18h18" />
                            <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3" />
                            <circle cx="18.7" cy="8" r="1.5" fill="currentColor" stroke="none" />
                        </svg>

                        <!-- Security Diagram -->
                        <svg *ngSwitchCase="'security'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                            <path d="M12 8v4" />
                            <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none" />
                        </svg>

                        <!-- Device Node Diagram -->
                        <svg *ngSwitchCase="'device'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />
                            <rect x="9" y="9" width="6" height="6" />
                            <line x1="9" y1="1" x2="9" y2="4" />
                            <line x1="15" y1="1" x2="15" y2="4" />
                            <line x1="9" y1="20" x2="9" y2="23" />
                            <line x1="15" y1="20" x2="15" y2="23" />
                            <line x1="20" y1="9" x2="23" y2="9" />
                            <line x1="20" y1="14" x2="23" y2="14" />
                            <line x1="1" y1="9" x2="4" y2="9" />
                            <line x1="1" y1="14" x2="4" y2="14" />
                        </svg>

                        <!-- Global Grid Diagram -->
                        <svg *ngSwitchCase="'global'" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="2" y1="12" x2="22" y2="12" />
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                            <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none" />
                        </svg>

                    </ng-container>
                </div>
                <h3>{{feature.title}}</h3>
                <p>{{feature.description}}</p>
            </div>
            }
        </div>
    </div>
</section>
