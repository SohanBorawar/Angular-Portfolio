<div class="section-wrap">

  <div class="section-header">
    <div class="section-icon">📞</div>
    <div class="section-header-text">
      <h2>Contact Details</h2>
      <p>Email, phone, location, availability
         and social links</p>
    </div>
  </div>

  @if(!data) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading contact data...</p>
    </div>
  } @else {

  <form [formGroup]="form"
        (ngSubmit)="onSubmit()"
        class="admin-form">

    <!-- Contact Info -->
    <div class="field-card">
      <div class="field-card-title">
        Contact Information
      </div>
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label required">
            Email Address
          </label>
          <input formControlName="email"
                 type="email"
                 class="form-input"
                 [class.input-error]="isInvalid('email')"
                 placeholder="you@example.com"/>
          @if(isInvalid('email')) {
            <span class="field-error">
              Valid email required
            </span>
          }
        </div>

        <div class="field-group">
          <label class="field-label">Phone</label>
          <input formControlName="phone"
                 class="form-input"
                 placeholder="+91 XXXXX XXXXX"/>
        </div>

        <div class="field-group">
          <label class="field-label">Location</label>
          <input formControlName="location"
                 class="form-input"
                 placeholder="India · Remote Worldwide"/>
        </div>

        <div class="field-group">
          <label class="field-label">
            Availability Status
          </label>
          <select formControlName="availability"
                  class="form-input form-select">
            <option value="">Select status...</option>
            <option value="Open to opportunities">
              Open to opportunities
            </option>
            <option value="Available for freelance">
              Available for freelance
            </option>
            <option value="Currently employed">
              Currently employed
            </option>
            <option value="Not available">
              Not available
            </option>
          </select>
        </div>

        <div class="field-group field-group--full">
          <label class="field-label">Website</label>
          <input formControlName="website"
                 class="form-input"
                 placeholder="https://yourwebsite.com"/>
        </div>

      </div>
    </div>

    <!-- Social Links -->
    <div class="field-card">
      <div class="field-card-title">Social Links</div>
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label">
            <span class="social-badge github">GH</span>
            GitHub URL
          </label>
          <input formControlName="github"
                 class="form-input"
                 placeholder="https://github.com/username"/>
        </div>

        <div class="field-group">
          <label class="field-label">
            <span class="social-badge linkedin">in</span>
            LinkedIn URL
          </label>
          <input formControlName="linkedin"
                 class="form-input"
                 placeholder="https://linkedin.com/in/username"/>
        </div>

        <div class="field-group">
          <label class="field-label">
            <span class="social-badge twitter">𝕏</span>
            Twitter / X URL
          </label>
          <input formControlName="twitter"
                 class="form-input"
                 placeholder="https://twitter.com/username"/>
        </div>

      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      @if(saveSuccess()) {
        <div class="inline-success">
          ✓ Contact details saved successfully!
        </div>
      }
      <button type="submit"
              class="btn-save"
              [disabled]="form.invalid">
        💾 Save Contact Details
      </button>
    </div>

  </form>

  }
</div>
